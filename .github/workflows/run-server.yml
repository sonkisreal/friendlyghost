name: Auto Run Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # BƯỚC QUYẾT ĐỊNH: Xóa bỏ file cấu hình Vite lỗi để Bun không thèm đọc nó nữa
      - name: Remove broken Vite config
        run: rm -f vite.config.ts

      - name: Run server.ts
        run: bun run server.ts
