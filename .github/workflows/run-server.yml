name: Auto Run Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-typescript:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Cài đặt Bun (Thay thế hoàn toàn cho Node.js)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 3. Cài đặt các thư viện tiêu chuẩn
      - name: Install dependencies
        run: bun install

      # 4. Ép Bun chạy duy nhất file server.ts, bỏ qua mọi config lỗi của Vite
      - name: Run server.ts
        run: bun run server.ts
