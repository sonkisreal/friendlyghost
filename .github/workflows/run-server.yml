name: Auto Run Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # Giải pháp quyết định: Thêm cờ --no-config để cô lập server.ts khỏi cấu hình Vite
      - name: Run server.ts
        run: npx tsx --no-config server.ts
