name: Auto Run Server

# Kích hoạt khi nào?
on:
  push:
    branches:
      - main # Chạy khi có code mới push lên nhánh main
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên giao diện GitHub

jobs:
  run-typescript:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu miễn phí của GitHub

    steps:
      # Bước 1: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Bạn có thể đổi thành phiên bản Node bạn cần

# Bước 3: Cài đặt các thư viện (Bao gồm cả devDependencies)
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --include=dev
          else
            npm install --include=dev
          fi

      # Bước 4: Chạy file server.ts bằng npx tsx hoặc ts-node
      - name: Run server.ts
        run: npx tsx server.ts
