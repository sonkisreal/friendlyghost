name: Auto Run Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-typescript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cài đặt các package chuẩn có trong package.json của bạn
      - name: Install dependencies
        run: npm install

      # Chạy file bằng ts-node (bỏ qua kiểm tra lỗi ép kiểu cấu hình Vite nếu có)
      - name: Run server.ts
        run: npx ts-node --transpile-only server.ts
