name: Auto Run Server

# Kích hoạt khi nào?
on:
  push:
    branches:
      - main # Chạy khi có code mới push lên nhánh main
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên giao diện GitHub

jobs:
  run-typescript:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu miễn phí của GitHub

    steps:
      # Bước 1: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Bạn có thể đổi thành phiên bản Node bạn cần

# Bước 3: Cài đặt các thư viện thông thường
      - name: Install dependencies
        run: npm install

      # Bước phụ: Cài bổ sung gói chính xác của Vite plugin
      - name: Install missing Vite plugin
        run: npm install @vitejs/plugin-react-refresh --no-save

      # Bước 4: Chạy file server.ts
      - name: Run server.ts
        run: npx tsx server.ts
